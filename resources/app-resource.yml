# AgentOPS Databricks App — stateful agent with Lakebase memory
#
# Deploys the agent as a FastAPI app with:
#   - Lakebase for session history + long-term user memory
#   - Vector search for RAG retrieval
#   - LLM endpoint for generation
#   - MLflow experiment for tracing
#
# After deploy: grant the app's service principal a Lakebase role
#   Compute > Lakebase > agentops-sessions > Roles > Add Role > <app service principal>

resources:
  experiments:
    agentops_app_experiment:
      name: /Users/${workspace.current_user.userName}/agentops-app

  apps:
    agentops_docs_app:
      name: agentops-docs-${bundle.target}
      description: "AgentOPS Docs Chatbot with Lakebase memory"
      source_code_path: ../src/agent_deployment/app/

      config:
        env:
          - name: CATALOG_NAME
            value: ${var.catalog}
          - name: SCHEMA_NAME
            value: ${var.schema}
          - name: LAKEBASE_AUTOSCALING_PROJECT
            value: agentops-sessions
          - name: LAKEBASE_AUTOSCALING_BRANCH
            value: production
          - name: VS_INDEX
            value: ${var.catalog}.${var.schema}.${var.vs_index}
          - name: VS_NUM_RESULTS
            value: "5"

      resources:
        - name: serving-endpoint
          serving_endpoint:
            name: ${var.llm_endpoint}
            permission: CAN_QUERY

        - name: app-experiment
          experiment:
            experiment_id: ${resources.experiments.agentops_app_experiment.id}
            permission: CAN_EDIT
