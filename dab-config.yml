# ─────────────────────────────────────────────────────────────
# Mastercard DAB Config — read by Jenkins CI/CD
#
# Team PR workflow:
#   1. Add/update your team directory under teams/
#   2. Update the variables section below with your team's values
#   3. Submit PR — Jenkins deploys to the 'work' target with these variables
# ─────────────────────────────────────────────────────────────

version: "1.0"
job_cluster: {}

usecase_specific_var:
  sp_id: "<SERVICE_PRINCIPAL_ID>"
  alert_mail_id: "<ALERT_EMAIL>"

mandatory_fields:
  workspace:
    workspace_name: "mastercard-edacde"
    dab_workspace_host: "https://mastercard-edacde-work-edacdedbx.cloud.databricks.com"
  dab_controllers:
    skip_auto_rollback: false
    skip_bundle_run: false
    databricks_jobs_and_pipeline_to_trigger: "agentops_pipeline"
    target: "work"

# ── Team Variables (updated per PR) ──
# Jenkins passes these as --var flags to: databricks bundle deploy -t work
variables:
  cluster_id: "<CLUSTER_ID>"
  llm_endpoint: "databricks-gpt-oss-120b"
  embedding_model: "databricks-gte-large-en"
  # ── Team-specific (update these in your PR) ──
  schema: "agentops"                              # e.g. platform_eng_agent
  audit_schema: "agentops_audit"                  # e.g. platform_eng_audit
  agent_name: "databricks_docs_agent"             # e.g. platform_eng_docs_agent
  chatbot_name: "agentops-docs-chatbot"           # e.g. platform-eng-chatbot
  vs_index: "databricks_docs_index"               # e.g. platform_eng_docs_index
  team_dir: ""                                    # e.g. platform-engineering
  team_config: ""                                 # e.g. teams/platform-engineering/config.yaml
