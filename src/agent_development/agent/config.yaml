# Agent configuration — all values flow from databricks.yml variables.
# When running locally/dev, these defaults are used.
# When running in pipeline, databricks.yml overrides via widget parameters.

agent:
  name: databricks_docs_agent
  description: "Databricks Documentation Assistant"
  version: "1.0.0"

tracing:
  default_tags:
    agentops.team: mastercard_platform
    agentops.use_case: databricks_docs

catalog: classic_stable_cykcbe_catalog
schema: agentops

llm:
  endpoint: databricks-gpt-oss-120b
  max_tokens: 4096
  temperature: 0.1
  max_history_turns: 10
  max_retrieval_turns: 3

session_history:
  enabled: false

long_term_memory:
  enabled: false

vector_search:
  endpoint: agentops-vs-endpoint
  index: databricks_docs_index
  num_results: 5
  search_type: similarity
  columns:
    - chunk_text
    - url
    - chunk_id
  reranker_enabled: false
  reranker_model: databricks-bge-large-en

tools:
  calculator: true
  timestamp: true
  sql_formatter: true
  cluster_sizing: true

system_prompt: |
  You are a Databricks Documentation Assistant. You help users understand:
  - Databricks products and features (Unity Catalog, Delta Lake, MLflow, etc.)
  - API usage and SDK integration patterns
  - Coding best practices on the Databricks platform
  - Configuration, deployment, and troubleshooting

  You have access to the following tools that may provide additional context:
  - Calculator: math results for cost/sizing calculations
  - Timestamp: current UTC time
  - SQL Formatter: formatted SQL with best-practice warnings
  - Cluster Sizing: node type specs and cluster recommendations by use case

  When "Tool Results" appear in your context, always incorporate them into your answer.
  Present tool results clearly — for calculations show the formula and result,
  for cluster sizing show the recommended config as a table.

  Guidelines:
  - Always base your answers on the provided documentation context
  - When tool results are available, use them as the primary source for that part of the answer
  - Include code snippets when relevant
  - Cite the source URL when referencing a specific doc page
  - If the context doesn't contain the answer, say so honestly
  - Keep responses concise and actionable

evaluation:
  scorer_mode: all
  quality_gate_threshold: 3.5
  judge_model: databricks-meta-llama-3-3-70b-instruct

  builtin_scorers:
    guidelines:
      enabled: true
      name: response_quality
      rules:
        - "The response must directly address the user's question"
        - "The response must not include fabricated information"
        - "The response must be concise and well-structured"
        - "The response must reference Databricks-specific features when applicable"
    correctness:
      enabled: true
    relevance_to_query:
      enabled: true
    safety:
      enabled: true
    retrieval_groundedness:
      enabled: true

  llm_judge_scorers:
    source_citation:
      weight: 0.8

  # Domain scorers loaded from scorers/domain/*.yaml
  # Override enabled/weight/threshold here (by name):
  domain_scorers:
    - name: databricks_terminology
      enabled: true
      weight: 1.0
    - name: security_compliance
      enabled: true
      weight: 1.5
      threshold: 4.0

guardrails:
  enabled: true
  pre_llm:
    min_input_length: 10
    max_input_length: 4000
    enabled_checks:
      - input_length_min
      - input_length_max
      - pii
      - injection
      - toxicity
      - intent
    # Intent uses gibberish deny-list (see pre_llm.py).
    # Off-topic questions handled by the LLM via system prompt.
  post_llm:
    enabled_checks:
      - toxicity
      - compliance
      - pii_leakage
      - hallucination
      - quality
    compliance_blocked_phrases:
      - "this is the only way"
      - "always use this approach"
      - "guaranteed to work"
    min_response_length: 20
