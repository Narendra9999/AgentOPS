# ─────────────────────────────────────────────────────────────
# Team: Example HR
#
# Deploy:  databricks bundle deploy -t team-hr
# Run:     databricks bundle run agentops_pipeline -t team-hr
# ─────────────────────────────────────────────────────────────

# ── Mastercard DAB Config (read by Jenkins CI/CD) ──
version: "1.0"
job_cluster: {}
usecase_specific_var:
  sp_id: "<SERVICE_PRINCIPAL_ID>"
  alert_mail_id: "<ALERT_EMAIL>"
mandatory_fields:
  workspace:
    workspace_name: "mastercard-edacde"
    dab_workspace_host: "https://mastercard-edacde-work-edacdedbx.cloud.databricks.com"
  dab_controllers:
    skip_auto_rollback: false
    skip_bundle_run: false
    databricks_jobs_and_pipeline_to_trigger: "agentops_pipeline"

# ── DAB Target ──
targets:
  team-hr:
    mode: development
    workspace:
      host: https://mastercard-edacde-work-edacdedbx.cloud.databricks.com
    variables:
      catalog: mc_edacde
      schema: hr_agent
      audit_schema: hr_agent_audit
      cluster_id: "<CLUSTER_ID>"
      llm_endpoint: databricks-gpt-oss-120b
      embedding_model: databricks-gte-large-en
      agent_name: hr_docs_agent
      chatbot_name: hr-docs-chatbot
      vs_index: hr_docs_index
      data_source_url: "local"
      team_dir: "example-hr"
      team_config: "teams/example-hr/config.yaml"
