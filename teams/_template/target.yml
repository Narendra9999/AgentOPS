# ─────────────────────────────────────────────────────────────
# Team Target Configuration
#
# Copy this entire directory to teams/<your-team>/ and fill in
# the values marked with < >.
#
# PR workflow:
#   1. Copy teams/_template/ to teams/<your-team>/
#   2. Fill in target.yml (this file), config.yaml, fixtures/, scorers/
#   3. Submit PR — Jenkins auto-deploys on merge to main
# ─────────────────────────────────────────────────────────────

# ── Mastercard DAB Config (read by Jenkins CI/CD) ──
version: "1.0"
job_cluster: {}
usecase_specific_var:
  sp_id: "<SERVICE_PRINCIPAL_ID>"
  alert_mail_id: "<ALERT_EMAIL>"
mandatory_fields:
  workspace:
    workspace_name: "<WORKSPACE_NAME>"
    dab_workspace_host: "<WORKSPACE_URL>"
  dab_controllers:
    skip_auto_rollback: false
    skip_bundle_run: false
    databricks_jobs_and_pipeline_to_trigger: "agentops_pipeline"

# ── DAB Target (included by databricks.yml) ──
targets:
  team-TEMPLATE:                          # ← rename to: team-<your-team>
    mode: development
    workspace:
      host: <WORKSPACE_URL>               # same as dab_workspace_host above
    variables:
      # ── Required ──
      catalog: <CATALOG>                  # e.g. mc_edacde
      schema: <TEAM_SCHEMA>              # e.g. hr_agent (unique per team)
      audit_schema: <TEAM_AUDIT_SCHEMA>  # e.g. hr_agent_audit
      cluster_id: "<CLUSTER_ID>"          # existing all-purpose cluster
      llm_endpoint: "<LLM_ENDPOINT>"      # e.g. databricks-gpt-oss-120b
      embedding_model: "<EMBED_MODEL>"    # e.g. databricks-gte-large-en

      # ── Agent Identity ──
      agent_name: <TEAM>_agent            # e.g. hr_docs_agent (unique per team)
      chatbot_name: <TEAM>-chatbot        # e.g. hr-docs-chatbot (serving endpoint name)

      # ── Data Source ──
      data_source_url: "local"            # "local" = bundled fixtures, URL = scrape sitemap
      team_dir: "<TEAM_DIR>"              # folder name (e.g. platform-engineering)
      team_config: "teams/<TEAM_DIR>/config.yaml"

      # ── Optional Overrides ──
      # vs_endpoint: <TEAM>-vs-endpoint   # defaults to agentops-vs-endpoint
      # vs_index: <TEAM>_docs_index       # defaults to databricks_docs_index
      # chunk_size: "1000"
      # chunk_overlap: "200"
      # serving_scale_to_zero: "true"
