# ─────────────────────────────────────────────────────────────
# Team: Platform Engineering
#
# Deploy:  databricks bundle deploy -t team-platform-eng
# Run:     databricks bundle run agentops_pipeline -t team-platform-eng
# ─────────────────────────────────────────────────────────────

# ── Mastercard DAB Config (read by Jenkins CI/CD) ──
version: "1.0"
job_cluster: {}
usecase_specific_var:
  sp_id: "<SERVICE_PRINCIPAL_ID>"
  alert_mail_id: "<ALERT_EMAIL>"
mandatory_fields:
  workspace:
    workspace_name: "mastercard-edacde"
    dab_workspace_host: "https://mastercard-edacde-work-edacdedbx.cloud.databricks.com"
  dab_controllers:
    skip_auto_rollback: false
    skip_bundle_run: false
    databricks_jobs_and_pipeline_to_trigger: "agentops_pipeline"

# ── DAB Target ──
targets:
  team-platform-eng:
    mode: development
    workspace:
      host: https://mastercard-edacde-work-edacdedbx.cloud.databricks.com
    variables:
      catalog: mc_edacde
      schema: platform_eng_agent
      audit_schema: platform_eng_audit
      cluster_id: "<CLUSTER_ID>"
      llm_endpoint: databricks-gpt-oss-120b
      embedding_model: databricks-gte-large-en
      agent_name: platform_eng_docs_agent
      chatbot_name: platform-eng-chatbot
      vs_index: platform_eng_docs_index
      data_source_url: "local"
      team_dir: "platform-engineering"
      team_config: "teams/platform-engineering/config.yaml"
